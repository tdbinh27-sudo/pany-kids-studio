<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!--
    Pany Kids Studio — Open Graph image (1200×630)
    For FB / Zalo / Telegram / Twitter link previews.
    Brand: gradient purple→pink, Fredoka-feel display, kid-friendly emoji accents.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5F1"/>
      <stop offset="50%" stop-color="#F9F4FF"/>
      <stop offset="100%" stop-color="#E5DBFF"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#845EC2"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </linearGradient>
    <linearGradient id="cta" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#845EC2"/>
      <stop offset="100%" stop-color="#6E4BB0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative confetti circles -->
  <circle cx="100" cy="120" r="30" fill="#FFD43B" opacity="0.5"/>
  <circle cx="1050" cy="80" r="22" fill="#FF6B9D" opacity="0.55"/>
  <circle cx="1120" cy="500" r="36" fill="#4DABF7" opacity="0.45"/>
  <circle cx="80" cy="540" r="26" fill="#51CF66" opacity="0.55"/>
  <circle cx="200" cy="60" r="14" fill="#845EC2" opacity="0.5"/>
  <circle cx="980" cy="560" r="18" fill="#FFD43B" opacity="0.6"/>

  <!-- Brand badge top-left -->
  <g transform="translate(60, 60)">
    <rect width="140" height="36" rx="18" fill="#FFFBEB" stroke="#FBBF24" stroke-width="2"/>
    <text x="70" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92400E" text-anchor="middle">🎁 MIỄN PHÍ 3 THÁNG</text>
  </g>

  <!-- Hero emoji row -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="84" text-anchor="middle">🌸 🚀 🎨 🌟 🧠</text>

  <!-- Main title -->
  <text x="600" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="url(#title)" text-anchor="middle" filter="url(#softShadow)">Pany Kids Studio</text>

  <!-- Subtitle line 1 -->
  <text x="600" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#2D1B4E" text-anchor="middle">
    Studio học tập gia đình · 5-16 tuổi · 5 học viên
  </text>

  <!-- Subtitle line 2 -->
  <text x="600" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#666" text-anchor="middle">
    12 trụ cột phát triển · Trợ lý AI Cô Pany · Setup 5 phút
  </text>

  <!-- CTA button -->
  <g transform="translate(400, 470)">
    <rect width="400" height="72" rx="36" fill="url(#cta)" filter="url(#softShadow)"/>
    <text x="200" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">
      kids.panyvn.app/dangky →
    </text>
  </g>

  <!-- Footer brand line -->
  <text x="600" y="592" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#845EC2" text-anchor="middle">
    PANY Vietnam · 2026 · Tuân thủ PDPL Việt Nam · panyvn.app
  </text>
</svg>
