<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!--
    Pany Kids Tree of Knowledge — CSS-style placeholder (D-035)
    Used until canonical Gemini Imagen output is saved at /tree-of-knowledge-hero.jpg.
    Pure SVG, matches brand palette (cyan dominant + navy + brand purple/pink accents).
  -->
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#0E2542" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0A1628" stop-opacity="1"/>
      <stop offset="100%" stop-color="#03060D" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="rayGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4FB3E8" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#4FB3E8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#4FB3E8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A3A5C" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0F2240" stop-opacity="0.95"/>
    </linearGradient>

    <radialGradient id="canopyGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4FB3E8" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#00BFFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#4FB3E8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4FB3E8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="discGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FB3E8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Dark navy radial background -->
  <rect width="1920" height="1080" fill="url(#bgRadial)"/>

  <!-- Volumetric god rays from above -->
  <g opacity="0.7">
    <polygon points="700,0 1220,0 1100,1080 820,1080" fill="url(#rayGrad)"/>
    <polygon points="860,0 1060,0 1000,1080 920,1080" fill="url(#rayGrad)" opacity="0.6"/>
    <polygon points="600,0 800,0 750,1080 650,1080" fill="url(#rayGrad)" opacity="0.4"/>
    <polygon points="1120,0 1320,0 1270,1080 1170,1080" fill="url(#rayGrad)" opacity="0.4"/>
  </g>

  <!-- Canopy halo (glow behind tree) -->
  <ellipse cx="960" cy="350" rx="700" ry="380" fill="url(#canopyGrad)" filter="url(#softBlur)"/>

  <!-- Floating data particles -->
  <g fill="#4FB3E8" opacity="0.7">
    <circle cx="320" cy="180" r="2"/>
    <circle cx="450" cy="260" r="2.5"/>
    <circle cx="540" cy="120" r="1.8"/>
    <circle cx="720" cy="200" r="2.2"/>
    <circle cx="1100" cy="160" r="2"/>
    <circle cx="1280" cy="240" r="2.4"/>
    <circle cx="1480" cy="180" r="1.8"/>
    <circle cx="1640" cy="320" r="2"/>
    <circle cx="380" cy="500" r="2"/>
    <circle cx="1580" cy="540" r="2.2"/>
    <circle cx="260" cy="640" r="1.8"/>
    <circle cx="1700" cy="700" r="2"/>
  </g>

  <!-- Tree trunk -->
  <path d="M 940 720 Q 930 580 920 440 Q 916 360 940 320 L 980 320 Q 1004 360 1000 440 Q 990 580 980 720 Z" fill="url(#trunkGrad)" stroke="#4FB3E8" stroke-width="1" stroke-opacity="0.6"/>

  <!-- 12 main branches (stylized) -->
  <g stroke="#1A3A5C" stroke-width="3" fill="none" opacity="0.85">
    <path d="M 940 360 Q 800 320 720 280"/>
    <path d="M 945 350 Q 820 280 760 200"/>
    <path d="M 950 340 Q 880 240 840 140"/>
    <path d="M 955 330 Q 940 220 920 100"/>
    <path d="M 960 325 Q 980 200 1000 80"/>
    <path d="M 965 330 Q 1040 220 1080 110"/>
    <path d="M 970 340 Q 1100 250 1160 160"/>
    <path d="M 975 350 Q 1160 290 1240 220"/>
    <path d="M 980 360 Q 1200 320 1280 280"/>
    <path d="M 935 380 Q 760 380 660 360"/>
    <path d="M 985 380 Q 1200 380 1300 380"/>
    <path d="M 960 320 Q 940 240 900 180"/>
  </g>

  <!-- Bioluminescent veins on trunk -->
  <g stroke="#4FB3E8" stroke-width="1.5" fill="none" opacity="0.85">
    <path d="M 960 720 Q 962 600 956 480 Q 950 380 960 320"/>
    <path d="M 950 700 Q 945 580 952 460"/>
    <path d="M 970 690 Q 975 570 968 450"/>
  </g>

  <!-- Glowing leaf clusters at branch tips -->
  <g>
    <circle cx="720" cy="280" r="40" fill="#4FB3E8" opacity="0.35" filter="url(#softBlur)"/>
    <circle cx="760" cy="200" r="50" fill="#4FB3E8" opacity="0.35" filter="url(#softBlur)"/>
    <circle cx="840" cy="140" r="55" fill="#4FB3E8" opacity="0.4" filter="url(#softBlur)"/>
    <circle cx="920" cy="100" r="60" fill="#00BFFF" opacity="0.45" filter="url(#softBlur)"/>
    <circle cx="1000" cy="80" r="65" fill="#00BFFF" opacity="0.5" filter="url(#softBlur)"/>
    <circle cx="1080" cy="110" r="60" fill="#00BFFF" opacity="0.45" filter="url(#softBlur)"/>
    <circle cx="1160" cy="160" r="55" fill="#4FB3E8" opacity="0.4" filter="url(#softBlur)"/>
    <circle cx="1240" cy="220" r="50" fill="#4FB3E8" opacity="0.35" filter="url(#softBlur)"/>
    <circle cx="1280" cy="280" r="40" fill="#4FB3E8" opacity="0.35" filter="url(#softBlur)"/>
  </g>

  <!-- 5 fruit-orbs pulsing in canopy -->
  <circle cx="850" cy="200" r="14" fill="url(#orbGrad)"/>
  <circle cx="960" cy="140" r="18" fill="url(#orbGrad)"/>
  <circle cx="1100" cy="220" r="14" fill="url(#orbGrad)"/>
  <circle cx="780" cy="300" r="12" fill="url(#orbGrad)"/>
  <circle cx="1200" cy="320" r="12" fill="url(#orbGrad)"/>

  <!-- Platform (outer disc) -->
  <ellipse cx="960" cy="780" rx="540" ry="60" fill="#0F2240" stroke="#4FB3E8" stroke-width="2" stroke-opacity="0.7"/>
  <ellipse cx="960" cy="780" rx="540" ry="60" fill="url(#discGlow)" opacity="0.35"/>

  <!-- Inner disc (raised) -->
  <ellipse cx="960" cy="740" rx="280" ry="32" fill="#163356" stroke="#00BFFF" stroke-width="2" stroke-opacity="0.85"/>

  <!-- Earth at center of outer disc -->
  <g transform="translate(960 760)">
    <circle r="34" fill="#0A2A4A" stroke="#4FB3E8" stroke-width="2"/>
    <path d="M -20 -10 Q -10 -20 10 -15 Q 20 -5 15 8 Q 0 18 -15 12 Q -25 0 -20 -10 Z" fill="#00D4AA" opacity="0.7"/>
    <circle r="34" fill="url(#orbGrad)" opacity="0.5"/>
  </g>

  <!-- Spaceship on inner disc -->
  <g transform="translate(1100 720)">
    <path d="M 0 0 L 40 -8 L 50 0 L 40 8 Z" fill="#E8F4FB" stroke="#4FB3E8" stroke-width="1"/>
    <circle cx="20" cy="0" r="4" fill="#00BFFF"/>
    <ellipse cx="-10" cy="0" rx="8" ry="3" fill="#00BFFF" opacity="0.6"/>
  </g>

  <!-- Hologram column (center) -->
  <g transform="translate(960 540)">
    <rect x="-60" y="-180" width="120" height="240" rx="8" fill="#4FB3E8" opacity="0.08" stroke="#4FB3E8" stroke-width="1" stroke-opacity="0.5"/>
    <circle cy="-120" r="22" fill="none" stroke="#4FB3E8" stroke-width="2" opacity="0.85"/>
    <circle cy="-120" r="14" fill="#E8F4FB" opacity="0.85"/>
    <circle cy="-30" r="28" fill="none" stroke="#00BFFF" stroke-width="3" opacity="0.85" stroke-dasharray="4,4"/>
    <circle cy="-30" r="10" fill="#0A1628" stroke="#00BFFF" stroke-width="2"/>
    <polyline points="-40,80 -20,40 0,55 20,20 40,40" fill="none" stroke="#4FB3E8" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- Left side template cards (Library/Learning/Curriculum/Tracks) -->
  <g>
    <rect x="120" y="640" width="80" height="120" rx="8" fill="#0F2240" stroke="#845EC2" stroke-width="2"/>
    <rect x="220" y="640" width="80" height="120" rx="8" fill="#0F2240" stroke="#845EC2" stroke-width="2"/>
    <rect x="320" y="640" width="80" height="120" rx="8" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <rect x="420" y="640" width="80" height="120" rx="8" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <text x="160" y="710" font-family="system-ui" font-size="11" fill="#E8F4FB" text-anchor="middle" font-weight="700">Library</text>
    <text x="260" y="710" font-family="system-ui" font-size="11" fill="#E8F4FB" text-anchor="middle" font-weight="700">Learning</text>
    <text x="360" y="710" font-family="system-ui" font-size="11" fill="#E8F4FB" text-anchor="middle" font-weight="700">Curriculum</text>
    <text x="460" y="710" font-family="system-ui" font-size="11" fill="#E8F4FB" text-anchor="middle" font-weight="700">Tracks</text>
  </g>

  <!-- Right side career medallions -->
  <g>
    <circle cx="1480" cy="640" r="22" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <circle cx="1540" cy="700" r="22" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <circle cx="1480" cy="760" r="22" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <circle cx="1620" cy="640" r="22" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <circle cx="1680" cy="700" r="22" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
    <circle cx="1620" cy="760" r="22" fill="#0F2240" stroke="#FF6B9D" stroke-width="2"/>
  </g>

  <!-- Floor reflection hint -->
  <ellipse cx="960" cy="900" rx="700" ry="20" fill="#4FB3E8" opacity="0.08"/>

  <!-- Subtle border vignette (cylindrical chamber walls suggestion) -->
  <rect width="1920" height="1080" fill="none" stroke="#000" stroke-width="20" opacity="0.5"/>
</svg>
